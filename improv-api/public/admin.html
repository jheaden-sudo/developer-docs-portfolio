<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Improv API Admin</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f8f8f8;
        }

        h1 {
            margin-bottom: 5px;
        }

        .dashboard {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        input, select, textarea {
            padding: 8px;
            font-size: 14px;
        }

        textarea {
            width: 95%;
            min-height: 80px;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .table-container {
            overflow-x: auto;
            background: white;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #eee;
        }

        .status {
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>Improv API Admin</h1>

<div class="dashboard">

    <p class="status" id="status">
        Connecting to API...
    </p>

    <p>
        Endpoint:
        <code>GET /games</code>
    </p>

</div>


<div class="controls">

    <input 
        type="text" 
        id="searchInput" 
        placeholder="Search games..."
    >

    <select id="categoryFilter">
        <option value="">All Categories</option>
    </select>

</div>


<div class="controls">

    <button id="editButton" onclick="enableEditMode()">
        Edit Mode
    </button>

    <button id="saveButton" onclick="saveChanges()" disabled>
        Save Changes
    </button>

    <button id="cancelButton" onclick="cancelEdit()" disabled>
        Cancel
    </button>

</div>


<div class="table-container">

<table id="gamesTable">

    <thead>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <th>Categories</th>
            <th>Skills</th>
            <th>Format</th>
            <th>Notes</th>
        </tr>

    </thead>

    <tbody>
    </tbody>

</table>

</div>


<script>

let games = [];
let editMode = false;
let originalGames = [];


fetch("/games")

    .then(response => {

        if (!response.ok) {
            throw new Error("API request failed");
        }

        return response.json();

    })

    .then(result => {

        games = result.data;

        populateCategories();
        renderGames(games);

        document.getElementById("status").textContent =
            `${games.length} games loaded`;

    })

    .catch(error => {

        document.getElementById("status").textContent =
            "Unable to load games";

        console.error(error);

    });



function renderGames(gameList) {

    const tbody =
        document.querySelector("#gamesTable tbody");

    tbody.innerHTML = "";


    gameList.forEach(game => {

        const row =
            document.createElement("tr");


        row.innerHTML = `

            <td>
                ${game.id}
            </td>

            <td>
                <input
                    data-id="${game.id}"
                    data-field="name"
                    value="${game.name}"
                    ${editMode ? "" : "disabled"}>
            </td>

            <td>
                <textarea
                    data-id="${game.id}"
                    data-field="description"
                    ${editMode ? "" : "disabled"}>${game.description}</textarea>
            </td>

            <td>
                <input
                    data-id="${game.id}"
                    data-field="categories"
                    value="${game.categories.join(", ")}"
                    ${editMode ? "" : "disabled"}>
            </td>

            <td>
                <input
                    data-id="${game.id}"
                    data-field="skills_practiced"
                    value="${game.skills_practiced.join(", ")}"
                    ${editMode ? "" : "disabled"}>
            </td>

            <td>
                <select
                    data-id="${game.id}"
                    data-field="player_format"
                    ${editMode ? "" : "disabled"}>

                    <option value="solo" ${game.player_format === "solo" ? "selected" : ""}>
                        Solo
                    </option>

                    <option value="pairs" ${game.player_format === "pairs" ? "selected" : ""}>
                        Pairs
                    </option>

                    <option value="small_group" ${game.player_format === "small_group" ? "selected" : ""}>
                        Small Group
                    </option>

                    <option value="group" ${game.player_format === "group" ? "selected" : ""}>
                        Group
                    </option>

                    <option value="everyone" ${game.player_format === "everyone" ? "selected" : ""}>
                        Everyone
                    </option>

                </select>
            </td>

            <td>
                <textarea
                    data-id="${game.id}"
                    data-field="notes"
                    ${editMode ? "" : "disabled"}>${game.notes || ""}</textarea>
            </td>

        `;


        tbody.appendChild(row);

    });

}



function enableEditMode() {

    editMode = true;


    originalGames =
        JSON.parse(JSON.stringify(games));


    document.getElementById("editButton").disabled = true;
    document.getElementById("saveButton").disabled = false;
    document.getElementById("cancelButton").disabled = false;


    renderGames(games);


    document.getElementById("status").textContent =
        "Edit mode enabled";

}



function saveChanges() {

    const inputs =
        document.querySelectorAll(
            "#gamesTable input, #gamesTable textarea, #gamesTable select"
        );


    inputs.forEach(input => {

        const id =
            input.dataset.id;

        const field =
            input.dataset.field;


        const game =
            games.find(game => game.id === id);


        if (
            field === "categories" ||
            field === "skills_practiced"
        ) {

            game[field] =
                input.value
                    .split(",")
                    .map(item => item.trim());

        }

        else {

            game[field] =
                input.value;

        }

    });


    editMode = false;


    document.getElementById("editButton").disabled = false;
    document.getElementById("saveButton").disabled = true;
    document.getElementById("cancelButton").disabled = true;


    renderGames(games);


    document.getElementById("status").textContent =
        "Changes saved locally";


    console.log(games);

}



function cancelEdit() {

    games =
        originalGames;


    editMode = false;


    document.getElementById("editButton").disabled = false;
    document.getElementById("saveButton").disabled = true;
    document.getElementById("cancelButton").disabled = true;


    renderGames(games);


    document.getElementById("status").textContent =
        "Changes discarded";

}



function populateCategories() {

    const select =
        document.getElementById("categoryFilter");


    const categories =
        [
            ...new Set(
                games.flatMap(game => game.categories)
            )
        ];


    categories.sort();


    categories.forEach(category => {

        const option =
            document.createElement("option");


        option.value = category;
        option.textContent = category;


        select.appendChild(option);

    });

}



document
    .getElementById("searchInput")
    .addEventListener("input", filterGames);



document
    .getElementById("categoryFilter")
    .addEventListener("change", filterGames);



function filterGames() {

    if (editMode) {

        document.getElementById("status").textContent =
            "Exit Edit Mode before filtering";

        return;

    }


    const search =
        document
            .getElementById("searchInput")
            .value
            .toLowerCase();


    const category =
        document
            .getElementById("categoryFilter")
            .value;


    const filtered =
        games.filter(game => {


            const matchesSearch =
                game.name
                    .toLowerCase()
                    .includes(search)

                ||

                game.description
                    .toLowerCase()
                    .includes(search);



            const matchesCategory =
                !category ||
                game.categories.includes(category);



            return matchesSearch && matchesCategory;

        });



    renderGames(filtered);

}

</script>

</body>
</html>
