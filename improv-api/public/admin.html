<!-- Polished version placeholder -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Improv API Admin</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f8f8f8;
        }

        h1 {
            margin-bottom: 5px;
        }

        .dashboard {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }

        .column-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }

        .column-controls label {
            margin-right: 10px;
        }

        input, select, textarea {
            padding: 8px;
            font-size: 14px;
        }

        textarea {
            width: 95%;
            min-height: 80px;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .table-container {
            overflow-x: auto;
            background: white;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            table-layout: auto;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
            vertical-align: top;
        }

        #gamesTable th:nth-child(2),
        #gamesTable td:nth-child(2) {
            width: 1%;
            white-space: nowrap;
        }

        th {
            background: #eee;
        }

        .status {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Improv API Admin</h1>

    <div class="dashboard">
        <p class="status" id="status">Connecting to API...</p>
        <p>Endpoint: <code>GET /games</code></p>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" placeholder="Search games...">
        <select id="categoryFilter">
            <option value="">All Categories</option>
        </select>
    </div>

    <div class="controls">
        <button id="editButton" onclick="enableEditMode()">Edit Mode</button>
        <button id="saveButton" onclick="saveChanges()" disabled>Save Changes</button>
        <button id="cancelButton" onclick="cancelEdit()" disabled>Cancel</button>
        <button id="addGameButton" onclick="showAddGameForm()">Add Game</button>
    </div>

    <div id="addGameForm" class="dashboard" style="display:none;">
        <h2>Add New Game</h2>
        <form id="gameForm" onsubmit="submitNewGame(event)">
            <div class="controls" style="flex-direction:column; align-items:flex-start; margin: 10px 0;">
                <label>Name<br><input type="text" id="newGameName" required></label>
                <label>Description<br><textarea id="newGameDescription" required></textarea></label>
                <label>Categories (comma separated)<br><input type="text" id="newGameCategories"></label>
                <label>Skills (comma separated)<br><input type="text" id="newGameSkills"></label>
                <label>Format<br><select id="newGameFormat">
                    <option value="solo">Solo</option>
                    <option value="pairs">Pairs</option>
                    <option value="small_group">Small Group</option>
                    <option value="group" selected>Group</option>
                    <option value="everyone">Everyone</option>
                </select></label>
                <label>Notes<br><textarea id="newGameNotes"></textarea></label>
            </div>
            <div class="controls">
                <button type="submit">Save Game</button>
                <button type="button" onclick="hideAddGameForm()">Cancel</button>
            </div>
        </form>
    </div>

    <div class="dashboard">
        <strong>Visible Columns</strong>
        <div class="column-controls">
            <label>
                <input type="checkbox" class="column-toggle" data-column="0" checked>
                ID
            </label>
            <label>
                <input type="checkbox" class="column-toggle" data-column="1" checked>
                Name
            </label>
            <label>
                <input type="checkbox" class="column-toggle" data-column="2" checked>
                Description
            </label>
            <label>
                <input type="checkbox" class="column-toggle" data-column="3" checked>
                Categories
            </label>
            <label>
                <input type="checkbox" class="column-toggle" data-column="4" checked>
                Skills
            </label>
            <label>
                <input type="checkbox" class="column-toggle" data-column="5" checked>
                Format
            </label>
            <label>
                <input type="checkbox" class="column-toggle" data-column="6" checked>
                Notes
            </label>
        </div>
    </div>

    <div class="table-container">
        <table id="gamesTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Categories</th>
                    <th>Skills</th>
                    <th>Format</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>

let games = [];
let editMode = false;
let originalGames = [];


fetch("/games")

.then(response => {

    if (!response.ok) {
        throw new Error("API request failed");
    }

    return response.json();

})

.then(result => {

    games = result.data;

    populateCategories();
    renderGames(games);
    loadColumnPreferences();

    document.getElementById("status").textContent =
        `${games.length} games loaded`;

})

.catch(error => {

    document.getElementById("status").textContent =
        "Unable to load games";

    console.error(error);

});


function showAddGameForm() {
    document.getElementById("addGameForm").style.display = "block";
}

function hideAddGameForm() {
    document.getElementById("addGameForm").style.display = "none";
    document.getElementById("gameForm").reset();
}

async function submitNewGame(event) {
    event.preventDefault();

    const payload = {
        name: document.getElementById("newGameName").value.trim(),
        description: document.getElementById("newGameDescription").value.trim(),
        categories: document.getElementById("newGameCategories").value.split(",").map(item => item.trim()).filter(Boolean),
        skills_practiced: document.getElementById("newGameSkills").value.split(",").map(item => item.trim()).filter(Boolean),
        player_format: document.getElementById("newGameFormat").value,
        notes: document.getElementById("newGameNotes").value.trim()
    };

    const response = await fetch("/games", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    });

    if (!response.ok) {
        const error = await response.json();
        document.getElementById("status").textContent = error.error || "Unable to add game";
        return;
    }

    const result = await response.json();
    games.push(result.data);
    populateCategories();
    renderGames(games);
    hideAddGameForm();
    document.getElementById("status").textContent = `Added ${result.data.name}`;
}
function renderGames(gameList) {
            const tbody = document.querySelector("#gamesTable tbody");
            tbody.innerHTML = "";

            gameList.forEach(game => {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${game.id}</td>
                    <td>
                        <input
                            data-id="${game.id}"
                            data-field="name"
                            value="${game.name}"
                            ${editMode ? "" : "disabled"}>
                    </td>
                    <td>
                        <textarea
                            data-id="${game.id}"
                            data-field="description"
                            ${editMode ? "" : "disabled"}>${game.description}</textarea>
                    </td>
                    <td>
                        <input
                            data-id="${game.id}"
                            data-field="categories"
                            value="${game.categories.join(", ")}"
                            ${editMode ? "" : "disabled"}>
                    </td>
                    <td>
                        <input
                            data-id="${game.id}"
                            data-field="skills_practiced"
                            value="${game.skills_practiced.join(", ")}"
                            ${editMode ? "" : "disabled"}>
                    </td>
                    <td>
                        <select
                            data-id="${game.id}"
                            data-field="player_format"
                            ${editMode ? "" : "disabled"}>
                            <option value="solo" ${game.player_format === "solo" ? "selected" : ""}>Solo</option>
                            <option value="pairs" ${game.player_format === "pairs" ? "selected" : ""}>Pairs</option>
                            <option value="small_group" ${game.player_format === "small_group" ? "selected" : ""}>Small Group</option>
                            <option value="group" ${game.player_format === "group" ? "selected" : ""}>Group</option>
                            <option value="everyone" ${game.player_format === "everyone" ? "selected" : ""}>Everyone</option>
                        </select>
                    </td>
                    <td>
                        <textarea
                            data-id="${game.id}"
                            data-field="notes"
                            ${editMode ? "" : "disabled"}>${game.notes || ""}</textarea>
                    </td>
                `;

                tbody.appendChild(row);
            });

            applyColumnVisibility();
        }

        function saveChanges() {
    const inputs =
        document.querySelectorAll(
            "#gamesTable input, #gamesTable textarea, #gamesTable select"
        );


    inputs.forEach(input => {

        const game =
            games.find(game => game.id === input.dataset.id);


        const field =
            input.dataset.field;


        if (
            field === "categories" ||
            field === "skills_practiced"
        ) {

            game[field] =
                input.value
                .split(",")
                .map(item => item.trim());

        }

        else {

            game[field] =
                input.value;

        }

    });


    editMode = false;


    document.getElementById("editButton").disabled = false;
    document.getElementById("saveButton").disabled = true;
    document.getElementById("cancelButton").disabled = true;


    renderGames(games);

    document.getElementById("status").textContent =
        "Changes saved locally";

}



function enableEditMode() {

    editMode = true;

    originalGames =
        JSON.parse(JSON.stringify(games));


    document.getElementById("editButton").disabled = true;
    document.getElementById("saveButton").disabled = false;
    document.getElementById("cancelButton").disabled = false;


    renderGames(games);

}



function cancelEdit() {

    games = originalGames;

    editMode = false;


    document.getElementById("editButton").disabled = false;
    document.getElementById("saveButton").disabled = true;
    document.getElementById("cancelButton").disabled = true;


    renderGames(games);

}



function applyColumnVisibility() {

    const settings =
        JSON.parse(
            localStorage.getItem("columnVisibility")
        ) || {};


    document.querySelectorAll("#gamesTable tr")
        .forEach(row => {

            row.querySelectorAll("th, td")
                .forEach((cell, index) => {

                    if (settings[index] === false) {
                        cell.style.display = "none";
                    }

                    else {
                        cell.style.display = "";
                    }

                });

        });

}



document.querySelectorAll(".column-toggle")
.forEach(toggle => {

    toggle.addEventListener("change", function() {

        const settings =
            JSON.parse(
                localStorage.getItem("columnVisibility")
            ) || {};


        settings[this.dataset.column] =
            this.checked;


        localStorage.setItem(
            "columnVisibility",
            JSON.stringify(settings)
        );
        applyColumnVisibility();
    });
});

function loadColumnPreferences() {
    const settings =
        JSON.parse(
            localStorage.getItem("columnVisibility")
        );

    if (!settings) {
        return;
    }

    document.querySelectorAll(".column-toggle")
    .forEach(toggle => {
        if (settings[toggle.dataset.column] !== undefined) {
            toggle.checked =
                settings[toggle.dataset.column];
        }
    });

    applyColumnVisibility();
}

function populateCategories() {
    const select = document.getElementById("categoryFilter");
    select.innerHTML = '<option value="">All Categories</option>';

    [...new Set(games.flatMap(game => game.categories))]
        .sort()
        .forEach(category => {
            const option = document.createElement("option");
            option.value = category;
            option.textContent = category;
            select.appendChild(option);
        });
}

document.getElementById("searchInput")
.addEventListener("input", filterGames);

document.getElementById("categoryFilter")
.addEventListener("change", filterGames);

function filterGames() {
    if (editMode) {
        document.getElementById("status").textContent =
            "Exit Edit Mode before filtering";
        return;
    }

    const search =
        document.getElementById("searchInput")
        .value
        .toLowerCase();

    const category =
        document.getElementById("categoryFilter")
        .value;


    const filtered =
        games.filter(game => {

            return (
                game.name.toLowerCase().includes(search)
                ||
                game.description.toLowerCase().includes(search)
            )
            &&
            (
                !category ||
                game.categories.includes(category)
            );

        });

    renderGames(filtered);

}

</script>

</body>
</html>
